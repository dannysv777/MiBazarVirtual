# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/mibazarvirtual_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# WebSocket
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=8192
spring.messaging.websocket.message-size-limit=8192
spring.messaging.websocket.send-buffer-size-limit=524288
spring.messaging.websocket.send-time-limit=20000

# Flyway migrations
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# JWT (Marcelo llenará esto con su implementación)
jwt.secret=clave_secreta_provisional_cambiar_despues
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Puerto
server.port=8080
