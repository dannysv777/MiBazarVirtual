# Active profile. Railway can override this with SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.profiles.include=local

# JPA common settings
spring.jpa.open-in-view=false

# WebSocket
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=8192
spring.messaging.websocket.message-size-limit=8192
spring.messaging.websocket.send-buffer-size-limit=524288
spring.messaging.websocket.send-time-limit=20000

# Flyway migrations common settings
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=clave_secreta_provisional_cambiar_despues
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Server
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Health check for Railway and presentation monitoring
management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${ALLOWED_ORIGINS:*}
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
